<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>66th Ocean Drive · Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Dancing+Script:wght@700&display=swap');

  :root {
    --blue:   #00cfff;
    --dark:   #060809;
    --surface:#0d1015;
    --border: #1d262f;
    --text:   #5c7a8f;
    --red-pastel: #ffb3b3;
    --red-hover: #ff9999;
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--dark); font-family:'Rajdhani',sans-serif; height:100vh; overflow:hidden; display: flex; flex-direction: column; }

  /* ── Header ── */
  #header {
    height:38px; display:flex; align-items:center;
    padding:0 18px; background:var(--surface); border-bottom:1px solid var(--border);
    flex-shrink: 0; z-index: 500;
  }
  .h-logo {
    font-family: 'Dancing Script', cursive; font-size: 1.2rem;
    color: var(--blue); margin-right: 20px;
  }
  
  /* Input para agregar canales */
  .h-add-box {
    display: flex; align-items: center; background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; margin-right: 15px;
  }
  .h-add-box input {
    background: transparent; border: none; color: var(--blue);
    font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; outline: none; width: 120px;
  }
  .h-add-box button {
    background: transparent; border: none; color: var(--text); cursor: pointer; font-size: 0.8rem; margin-left: 5px;
  }
  .h-add-box button:hover { color: var(--blue); }

  .h-right { display:flex; align-items:center; gap:20px; margin-left:auto; }
  .h-pill { display:flex; align-items:center; gap:8px; }
  .h-lbl { font-family:'Orbitron',sans-serif; font-size:0.5rem; color:var(--text); text-transform:uppercase; letter-spacing: 0.1em; }
  .h-val { font-family:'Orbitron',sans-serif; font-size:0.75rem; color:#ff3355; font-weight: 900; }

  .hbtn {
    padding: 4px 12px; background: rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:4px;
    color:var(--text); font-family:'Orbitron',sans-serif; font-size:0.55rem;
    text-transform:uppercase; cursor:pointer; transition: all 0.2s;
  }
  .hbtn:hover { color:var(--blue); border-color:var(--blue); }

  /* ── Layout Principal (Grid + Sidebar) ── */
  #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
  
  #sGrid {
    flex: 1; display: flex; flex-wrap: wrap;
    align-content: center; justify-content: center; padding: 12px; gap: 10px;
    transition: margin-right 0.3s ease;
  }

  /* ── Sidebar de Chat ── */
  #sidebar {
    width: 0; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.3s ease; overflow: hidden;
  }
  #sidebar.open { width: 340px; }
  .side-head { padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .side-select {
    background: #111820; border: 1px solid var(--border); color: var(--blue);
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem; padding: 5px; border-radius: 4px; outline: none;
  }
  .side-content { flex: 1; background: #000; }
  .side-content iframe { width: 100%; height: 100%; border: none; }

  /* ── Celdas ── */
  .cell { position: relative; background:#000; border:1px solid var(--border); border-radius:4px; overflow:hidden; aspect-ratio: 16/9; }
  .cell.hidden { display:none !important; }
  .ch {
    position: absolute; top: 0; left: 0; right: 0; height: 40px;
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 10px; z-index: 10; opacity: 0; transition: opacity 0.3s;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  .cell:hover .ch { opacity: 1; }
  .ch-btn {
    background: var(--red-pastel); border: none; color: #612c2c;
    width: 20px; height: 20px; border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-weight: bold;
  }

  .cp { width: 100%; height: 100%; }
  .cp iframe { width: 100%; height: 100%; border: none; }

  #hiddenDrop {
    position:fixed; top:42px; right:80px; background:var(--surface);
    border:1px solid var(--border); border-radius:6px; z-index:600;
    display:none; min-width:200px; box-shadow:0 10px 40px rgba(0,0,0,0.9);
  }
  .hd-row { padding:10px 15px; border-bottom:1px solid rgba(255,255,255,0.03); cursor:pointer; display:flex; justify-content:space-between; }
  .hd-row:hover { background: #161d26; }
</style>
</head>
<body>

<div id="header">
  <div class="h-logo">66th Ocean Drive</div>
  
  <div class="h-add-box">
    <input type="text" id="addInput" placeholder="Agregar canal de Kick..." onkeypress="if(event.key==='Enter') addStream()">
    <button onclick="addStream()">+</button>
  </div>

  <div class="h-right">
    <div class="h-pill">
      <span class="h-lbl">En vivo</span>
      <span class="h-val" id="liveNum">0</span>
    </div>
    <button class="hbtn" id="hiddenBtn" style="display:none; border-color: rgba(0,207,255,0.3);" onclick="toggleHiddenDrop()">
      Streams ocultos &nbsp; &nbsp; <span id="hiddenCount" style="color:var(--blue)">0</span>
    </button>
    <button class="hbtn" onclick="refresh()">Actualizar</button>
    <button class="hbtn" onclick="toggleChat()" style="background: rgba(0,207,255,0.1); border-color: var(--blue); color: var(--blue);">CHAT</button>
  </div>
</div>

<div id="main-container">
  <div id="sGrid"></div>
  
  <div id="sidebar">
    <div class="side-head">
      <span class="h-lbl">Seleccionar Chat</span>
      <select id="chatSelect" class="side-select" onchange="loadChat(this.value)">
        <option value="">Cargando canales...</option>
      </select>
    </div>
    <div class="side-content" id="chatFrame"></div>
  </div>
</div>

<div id="hiddenDrop"></div>

<script>
let CHANNELS = ['fulve','khandbl','lichxg','srtavodka','pakito0o0','kukitow','janter','vodkaah','bricenhox','polli','lukitasgg','rodrizs1','marianno181','claraleans','mgl-3113','cobraadlzr','elcharlito','nanuchoo','sic0-o','zetauno','wizzyts','fackens','nahu8928','srmomex','llicha','leyespa','nosoygomy'];
const SERVER = 'https://66th-multistream.vercel.app';
let liveData = [];
let hiddenSet = new Set();
let order = [];

function mountPlayer(channel) {
  const cp = document.getElementById(`cp-${channel}`);
  if (!cp) return;
  const params = `muted=true&autoplay=true&hide_info=true&pip=false&opentokick=false`;
  cp.innerHTML = `<iframe src="https://player.kick.cx/${channel}?${params}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
}

function addStream() {
  const input = document.getElementById('addInput');
  const user = input.value.trim().toLowerCase();
  if (!user) return;
  if (!CHANNELS.includes(user)) CHANNELS.push(user);
  input.value = '';
  init();
}

function toggleChat() {
  const side = document.getElementById('sidebar');
  side.classList.toggle('open');
  updateChatSelect();
  setTimeout(applyGrid, 310);
}

function loadChat(channel) {
  const frame = document.getElementById('chatFrame');
  if (!channel) { frame.innerHTML = ''; return; }
  frame.innerHTML = `<iframe src="https://kick.com/popout/${channel}/chat"></iframe>`;
}

function updateChatSelect() {
  const select = document.getElementById('chatSelect');
  const current = select.value;
  select.innerHTML = '<option value="">-- Seleccionar --</option>';
  order.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch;
    opt.textContent = ch.toUpperCase();
    if (ch === current) opt.selected = true;
    select.appendChild(opt);
  });
}

async function fetchLive() {
  try {
    const res = await fetch(`${SERVER}/api/live?channels=${CHANNELS.join(',')}`);
    return await res.json();
  } catch(e) { return []; }
}

function applyGrid() {
  const container = document.getElementById('sGrid');
  const visible = order.filter(ch => !hiddenSet.has(ch));
  const n = visible.length;
  if (n === 0) return;

  const gap = 10;
  const winW = container.clientWidth - 24;
  const winH = container.clientHeight - 24;

  let bestW = 0;
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    const maxWidth = (winW - (cols - 1) * gap) / cols;
    const maxHeight = (winH - (rows - 1) * gap) / rows;
    let w = Math.min(maxWidth, maxHeight * (16/9));
    if (w > bestW) bestW = w;
  }

  const finalW = Math.floor(bestW);
  visible.forEach(ch => {
    const el = document.getElementById(`cell-${ch}`);
    if (el) el.style.width = `${finalW}px`;
  });
}

async function init() {
  const data = await fetchLive();
  const newChs = data.map(d => d.channel);
  liveData.forEach(d => { if(!newChs.includes(d.channel)) document.getElementById(`cell-${d.channel}`)?.remove(); });
  liveData = data;
  order = [...order.filter(ch => newChs.includes(ch)), ...newChs.filter(ch => !order.includes(ch))];
  document.getElementById('liveNum').textContent = liveData.length;
  renderCells();
  applyGrid();
  updateHiddenBtn();
  updateChatSelect();
}

function renderCells() {
  const grid = document.getElementById('sGrid');
  liveData.forEach(({channel}) => {
    if (document.getElementById(`cell-${channel}`)) return;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${channel}`;
    cell.dataset.ch = channel;
    cell.innerHTML = `<div class="ch"><button class="ch-btn" onclick="hideOne('${channel}')">✕</button></div><div class="cp" id="cp-${channel}"></div>`;
    grid.appendChild(cell);
    mountPlayer(channel);
  });
}

function hideOne(ch) {
  hiddenSet.add(ch);
  document.getElementById(`cell-${ch}`).classList.add('hidden');
  document.getElementById(`cp-${ch}`).innerHTML = '';
  applyGrid();
  updateHiddenBtn();
}

function showOne(ch) {
  hiddenSet.delete(ch);
  document.getElementById(`cell-${ch}`).classList.remove('hidden');
  mountPlayer(ch);
  applyGrid();
  updateHiddenBtn();
}

function updateHiddenBtn() {
  const n = hiddenSet.size;
  document.getElementById('hiddenCount').textContent = n;
  document.getElementById('hiddenBtn').style.display = n > 0 ? 'inline-flex' : 'none';
}

function toggleHiddenDrop() {
  const drop = document.getElementById('hiddenDrop');
  if (drop.style.display === 'block') { drop.style.display = 'none'; return; }
  drop.innerHTML = '';
  [...hiddenSet].forEach(ch => {
    const row = document.createElement('div');
    row.className = 'hd-row';
    row.innerHTML = `<span style="font-family:Orbitron; font-size:0.6rem; color:#888">${ch.toUpperCase()}</span><span style="color:var(--blue); font-weight:bold">+</span>`;
    row.onclick = () => { showOne(ch); drop.style.display = 'none'; };
    drop.appendChild(row);
  });
  drop.style.display = 'block';
}

function refresh() { init(); }
window.addEventListener('resize', applyGrid);
init();
setInterval(init, 1200000);
</script>
</body>
</html>
